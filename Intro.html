<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mart Recovery Intro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000;
      overflow: hidden;
      font-family: "Courier New", monospace;
      color: #00ff88;
    }

    .screen {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at center, rgba(0,255,120,0.06), transparent 40%),
        #000;
      overflow: hidden;
    }

    .screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.035) 0px,
        rgba(255,255,255,0.035) 1px,
        transparent 2px,
        transparent 4px
      );
      opacity: 0.18;
      pointer-events: none;
      z-index: 3;
    }

    .screen::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, transparent 55%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
      z-index: 3;
    }

    .terminal {
      position: relative;
      width: min(1050px, 94vw);
      min-height: 74vh;
      padding: 24px;
      border: 1px solid rgba(0,255,120,0.18);
      background: rgba(0, 12, 0, 0.48);
      box-shadow:
        0 0 18px rgba(0,255,120,0.12),
        0 0 50px rgba(0,255,120,0.05),
        inset 0 0 20px rgba(0,255,120,0.04);
      overflow: hidden;
      z-index: 2;
    }

    .titlebar {
      color: #73ffba;
      opacity: 0.8;
      font-size: 13px;
      margin-bottom: 18px;
      letter-spacing: 1px;
      text-shadow: 0 0 8px rgba(0,255,120,0.35);
    }

    #output {
      white-space: pre-wrap;
      font-size: clamp(14px, 2vw, 25px);
      line-height: 1.5;
      text-shadow:
        0 0 6px rgba(0,255,120,0.35),
        0 0 12px rgba(0,255,120,0.15);
      word-break: break-word;
    }

    .cursor {
      display: inline-block;
      width: 12px;
      color: #9affcb;
      text-shadow: 0 0 10px #00ff88;
      animation: blink 0.8s steps(1) infinite;
      vertical-align: top;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .glitch-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      z-index: 4;
      mix-blend-mode: screen;
    }

    .glitch-layer.active {
      opacity: 1;
      animation: glitchFlash 0.18s linear infinite;
    }

    @keyframes glitchFlash {
      0% {
        transform: translate(0, 0);
        background: linear-gradient(transparent 0 10%, rgba(255,0,80,0.08) 10% 12%, transparent 12% 100%);
      }
      25% {
        transform: translate(-4px, 1px);
        background: linear-gradient(transparent 0 40%, rgba(0,200,255,0.08) 40% 45%, transparent 45% 100%);
      }
      50% {
        transform: translate(4px, -2px);
        background: linear-gradient(transparent 0 70%, rgba(255,255,255,0.07) 70% 72%, transparent 72% 100%);
      }
      75% {
        transform: translate(-2px, 2px);
        background: linear-gradient(transparent 0 25%, rgba(0,255,120,0.09) 25% 29%, transparent 29% 100%);
      }
      100% {
        transform: translate(0, 0);
        background: linear-gradient(transparent 0 85%, rgba(255,0,120,0.06) 85% 88%, transparent 88% 100%);
      }
    }

    .shake {
      animation: shake 0.18s linear infinite;
    }

    @keyframes shake {
      0% { transform: translate(0px, 0px); }
      10% { transform: translate(-4px, 2px); }
      20% { transform: translate(5px, -2px); }
      30% { transform: translate(-6px, 4px); }
      40% { transform: translate(6px, -4px); }
      50% { transform: translate(-5px, 2px); }
      60% { transform: translate(4px, -3px); }
      70% { transform: translate(-3px, 3px); }
      80% { transform: translate(3px, -2px); }
      90% { transform: translate(-2px, 2px); }
      100% { transform: translate(0px, 0px); }
    }

    .error-line {
      color: #ff4d6d;
      text-shadow:
        0 0 6px rgba(255,0,80,0.65),
        0 0 16px rgba(255,0,80,0.4);
    }

    .success-line {
      color: #9affcb;
      text-shadow:
        0 0 8px rgba(0,255,130,0.5),
        0 0 20px rgba(0,255,130,0.25);
    }

    .connected-final {
      display: inline-block;
      color: #d3ffe9;
      text-shadow:
        0 0 6px #7cffbf,
        0 0 12px #4dffaf,
        0 0 24px #18ff93,
        0 0 40px rgba(24,255,147,0.7);
      animation: connectedPulse 1s ease-in-out infinite alternate;
    }

    @keyframes connectedPulse {
      from {
        opacity: 0.82;
        transform: scale(1);
        filter: brightness(1);
      }
      to {
        opacity: 1;
        transform: scale(1.03);
        filter: brightness(1.35);
      }
    }

    .flash {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(0,255,130,0.22), transparent 55%);
      opacity: 0;
      pointer-events: none;
      z-index: 5;
    }

    .flash.show {
      animation: flashAnim 1.2s ease forwards;
    }

    @keyframes flashAnim {
      0% { opacity: 0; }
      20% { opacity: 1; }
      100% { opacity: 0; }
    }

    .hint {
      position: absolute;
      right: 12px;
      bottom: 10px;
      font-size: 11px;
      opacity: 0.35;
      z-index: 6;
      color: #8effc5;
    }

    .redirect-msg {
      position: absolute;
      left: 24px;
      bottom: 16px;
      color: #c7ffe3;
      font-size: 12px;
      opacity: 0;
      z-index: 7;
      text-shadow: 0 0 10px rgba(0,255,120,0.4);
      transition: opacity .4s ease;
    }

    .redirect-msg.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="screen" id="screen">
    <div class="terminal" id="terminal">
      <div class="titlebar">mart://recovery_terminal</div>
      <div id="output"></div><span class="cursor" id="cursor">█</span>
      <div class="flash" id="flash"></div>
      <div class="redirect-msg" id="redirectMsg">Opening destination...</div>
    </div>

    <div class="glitch-layer" id="glitchLayer"></div>
    <div class="hint">toque/click para ativar áudio</div>
  </div>

  <script>
    const DESTINO = "SEU_LINK_AQUI"; // ex: "https://meusite.com"
    const REDIRECT_DELAY = 2200;

    const output = document.getElementById("output");
    const terminal = document.getElementById("terminal");
    const screen = document.getElementById("screen");
    const glitchLayer = document.getElementById("glitchLayer");
    const flash = document.getElementById("flash");
    const redirectMsg = document.getElementById("redirectMsg");

    const steps = [
      { text: "-=[entering system]=-", type: "normal" },
      { text: "\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\", type: "normal" },
      { text: "< [Load system] >", type: "normal" },
      { text: "\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\", type: "normal" },
      { text: "{Error Error}", type: "error", shake: true, glitch: true },
      { text: "<[Retry load system]>", type: "error", shake: true, glitch: true },
      { text: "\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\", type: "normal" },
      { text: "[Error Error]", type: "error", shake: true, glitch: true },
      { text: "[Try mart recovery]", type: "normal" },
      { text: "\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\", type: "normal" },
      { text: "[Mart recovery connect]", type: "normal" },
      { text: "\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\", type: "normal" },
      { text: "[Mart recoveryed]", type: "success" },
      { text: "{Asses password{******}}", type: "normal" },
      { text: "Password confirmed correct", type: "success" },
      { text: "\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\", type: "normal" },
      { text: "User /-/-/-/-[mart-tempest]-/-/-/-/", type: "success" },
      { text: "", type: "normal" },
      { text: "Connected", type: "connected" }
    ];

    let currentStep = 0;
    let currentChar = 0;
    let audioStarted = false;
    let redirected = false;

    function escapeHtml(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function renderLines(lines, activeText = "", activeClass = "") {
      let html = "";

      lines.forEach(item => {
        let cls = "";
        if (item.type === "error") cls = "error-line";
        if (item.type === "success") cls = "success-line";
        if (item.type === "connected") cls = "connected-final";
        html += `<div class="${cls}">${escapeHtml(item.text)}</div>`;
      });

      if (activeText !== null) {
        html += `<div class="${activeClass}">${escapeHtml(activeText)}</div>`;
      }

      output.innerHTML = html;
    }

    function getClassByType(type) {
      if (type === "error") return "error-line";
      if (type === "success") return "success-line";
      if (type === "connected") return "connected-final";
      return "";
    }

    function activateGlitch(duration = 600) {
      glitchLayer.classList.add("active");
      setTimeout(() => glitchLayer.classList.remove("active"), duration);
    }

    function activateShake(duration = 500) {
      screen.classList.add("shake");
      setTimeout(() => screen.classList.remove("shake"), duration);
    }

    function finalFlash() {
      flash.classList.remove("show");
      void flash.offsetWidth;
      flash.classList.add("show");
    }

    let ctx = null;

    function initAudio() {
      if (audioStarted) return;
      audioStarted = true;
      try {
        ctx = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) {}
    }

    function beep(freq = 700, duration = 0.025, volume = 0.02, type = "square") {
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = volume;

      osc.connect(gain);
      gain.connect(ctx.destination);

      const now = ctx.currentTime;
      gain.gain.setValueAtTime(volume, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

      osc.start(now);
      osc.stop(now + duration);
    }

    function errorSound() {
      if (!ctx) return;
      beep(180, 0.07, 0.04, "sawtooth");
      setTimeout(() => beep(120, 0.09, 0.035, "square"), 60);
      setTimeout(() => beep(90, 0.11, 0.03, "triangle"), 120);
    }

    function successSound() {
      if (!ctx) return;
      beep(420, 0.06, 0.03, "triangle");
      setTimeout(() => beep(620, 0.07, 0.03, "triangle"), 70);
      setTimeout(() => beep(820, 0.1, 0.025, "triangle"), 140);
    }

    function connectedSound() {
      if (!ctx) return;
      beep(500, 0.08, 0.03, "triangle");
      setTimeout(() => beep(700, 0.1, 0.03, "triangle"), 90);
      setTimeout(() => beep(980, 0.16, 0.035, "triangle"), 180);
    }

    function goToDestination() {
      if (redirected) return;
      redirected = true;
      redirectMsg.classList.add("show");

      setTimeout(() => {
        if (DESTINO && DESTINO !== "SEU_LINK_AQUI") {
          window.location.href = DESTINO;
        }
      }, REDIRECT_DELAY);
    }

    function typeLoop() {
      if (currentStep >= steps.length) {
        finalFlash();
        connectedSound();
        goToDestination();
        return;
      }

      const step = steps[currentStep];
      const doneLines = steps.slice(0, currentStep);
      const visibleText = step.text.slice(0, currentChar);
      const activeClass = getClassByType(step.type);

      renderLines(doneLines, visibleText, activeClass);

      if (currentChar < step.text.length) {
        currentChar++;

        if (step.text[currentChar - 1] !== " ") {
          beep(
            step.type === "error" ? 160 : 720,
            0.018,
            step.type === "error" ? 0.028 : 0.014,
            step.type === "error" ? "sawtooth" : "square"
          );
        }

        const speed =
          step.type === "connected" ? 55 :
          step.type === "error" ? 28 :
          34;

        setTimeout(typeLoop, speed);
      } else {
        if (step.glitch) activateGlitch(700);
        if (step.shake) activateShake(700);
        if (step.type === "error") errorSound();
        if (step.type === "success") successSound();

        currentStep++;
        currentChar = 0;

        if (step.type === "connected") {
          finalFlash();
        }

        setTimeout(typeLoop, step.type === "error" ? 380 : 240);
      }
    }

    function startIntro() {
      initAudio();
      if (!window.__introStarted) {
        window.__introStarted = true;
        setTimeout(typeLoop, 500);
      }
    }

    window.addEventListener("click", startIntro, { once: true });
    window.addEventListener("touchstart", startIntro, { once: true });

    setTimeout(() => {
      if (!window.__introStarted) {
        window.__introStarted = true;
        setTimeout(typeLoop, 500);
      }
    }, 900);
  </script>
</body>
  </html>
